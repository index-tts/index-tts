name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lightweight-checks:
    name: Lightweight Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Syntax check
        run: uv run --no-project python -m compileall -q indextts webui.py

      - name: Unit tests
        run: uv run --no-project python -m unittest discover -s tests -p "test_*.py"
