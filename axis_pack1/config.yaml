# 微表情 -> 提示词口令（用于 build_emo_text）
microexpression_prompts:
  "叹息": "先轻轻叹一口气再说，开头带一点气声，句尾略下沉"
  "冷笑": "带一点短促的鼻音冷笑感，语气轻蔑但不要笑出声"
  "倒吸气": "开口前有轻微吸气，声音发紧，后半句更谨慎"
  "哭腔": "声音发颤带哭腔，鼻音更重，但仍能清楚吐字"
  "正常": ""

# 微表情 -> 音量增益(dB)（用于 calculate_energy_gain）
microexpression_energy_gain_db:
  "冷笑": 1.0
  "叹息": -2.2
  "倒吸气": -1.5
  "哭腔": -1.3
  "正常": 0.0
# 微表情 -> 语气助词注入（文本层）
micro_particle_injection:
  enabled: true
  default_prob: 0.85
  rules:
    "冷笑":
      particle: "呵"
      style: "prefix"     # prefix | suffix
      joiner: "！"        # 接在语气词后的连接符
      prob: 0.90
    "叹息":
      particle: "诶"
      style: "prefix"
      joiner: "……"
      prob: 0.80
    "倒吸气":
      particle: "嘶"
      style: "prefix"
      joiner: "——"
      prob: 0.75

