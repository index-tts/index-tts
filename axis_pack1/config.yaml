# CRM prompts
crm_prompts:
  意图标签说明:
    Agent意图:
    - 身份构建
    - 背景铺垫
    - 危机植入
    - 操作指令
    - 打消疑虑
    - 情感拉近
    - 状态确认
    - 利益诱导
    User意图:
    - 信息核实
    - 执行操作
    - 寻找借口
    - 请求通融
    - 理清思路
    通用意图:
    - 开场白
    - 闲聊
    - 应答
    - 结束语
  代理意图:
    身份构建:
      说明: 清晰说明身份与机构，建立初步信任。
      情绪提示: 正常，语气坚定，带有权威感
      示例:
        正常通话: 赵先生您好，我这里是宏远建设集团人事部的，我姓李。我们在招聘网站上看到了您更新的简历，觉得您非常适合我们目前正在招聘的高级电工岗位，所以打电话想跟您沟通一下。
        涉嫌诈骗: 潘女士您好，我这边是'智联未来科技'招聘部的王经理。我们在高端人才库里看到了您的简历，觉得您作为人事专员的背景非常优秀，特别符合我们正在招聘的一个线上兼职岗位。
        确认诈骗: 你好渠同学，我这边是'青禾在线'人力资源部的招聘专员。我们看到您近期在我们的合作平台上投递了一份线上兼职的简历，所以打电话过来跟您沟通一下。
    背景铺垫:
      说明: 基于事实陈述风险背景，引导用户关注。
      情绪提示: 正常，语气平稳，带有引导性
      示例:
        正常通话: 是这样的，我们公司在城南新开发区有个大型商业综合体项目，现在主体结构快完工了，需要招聘经验丰富的电工师傅负责整个项目的强弱电系统施工管理和后期维护。要求有十年以上相关经验，持有效的高级电工证。
        涉嫌诈骗: 是这样的，这是一个远程人才顾问的职位，工作时间非常灵活，主要是协助我们筛选一些简历，薪资是按项目结算的，每个月轻松过万。因为是内部推荐名额，机会很难得。
        确认诈骗: 不复杂，薛师傅。就是我们系统会推送一些新的城市路线，您根据您开网约车的经验，在手机上点一点，评价一下路线的合理性就行，非常简单，工资都是当天结算的。
    危机植入:
      说明: 客观指出风险严重性，引起重视。
      情绪提示: 压迫性，语气严厉，带有威胁性
      示例:
        正常通话: 若非本人操作，您的账户资金可能存在被盗风险。
        涉嫌诈骗: 若不立即中断，您的资金可能在几分钟内被转走。
        确认诈骗: 诈骗分子可能继续对您进行二次诈骗，请勿再相信任何索要资金的说辞。
    操作指令:
      说明: 给出具体、可操作的安全指令。
      情绪提示: 不耐烦，语气急促，带有命令感
      示例:
        正常通话: 那太好了。不知道您这周或者下周什么时间方便，我们可以安排一个线下面试，让您和我们工程部的负责人当面聊一聊？
        涉嫌诈骗: 哎呀，邮件流程太慢了，等邮件发过去，我们这边的名额可能就没了。这样吧，为了让您快速了解，我马上通过短信给您发一个我们内部的'工作通'二维码，您扫码添加我们招聘主管的企业微信，他会把所有资料发给您，并指导您完成入职，非常方便快捷！
        确认诈骗: 不用不用，薛师傅，我们全程是线上办公，非常方便。这样，为了让您更快地办理入职，我等下通过短信给您发一个人事专员的二维码，您用微信扫一下加她，她会带您走完后续的流程，今天办完还能领个新人红包。
    打消疑虑:
      说明: 回应用户的疑虑，表达理解与确认。
      情绪提示: 正常，语气耐心，带有安抚感
      示例:
        正常通话: 这个您放心，我们是正规大公司，五险一金都是按最高标准缴纳的。薪资方面，根据您的资历和面试情况，税前大概在1万到1万5之间，还有项目奖金。不知道您目前是在职还是在看新的机会？
        涉嫌诈骗: 问得好！潘女士，您不愧是专业的HR。我们这个项目比较紧急，所以简化了流程，对于您这样背景优秀的候选人，我们是直接通过绿色通道的。只要您这边有意向，我们可以马上为您办理线上入职手续。
        确认诈骗: 呵呵，可能是您投递的岗位比较多忘记了，没关系的。我们这个岗位非常简单，是做短视频点赞评论员，在家用手机就能操作，时间很自由，特别适合你们在校大学生。
    情感拉近:
      说明: 理解用户情绪，建立信任与支持感。
      情绪提示: 正常，语气亲切，带有亲近感
      示例:
        正常通话: 那太好了。不知道您这周或者下周什么时间方便，我们可以安排一个线下面试，让您和我们工程部的负责人当面聊一聊？
        涉嫌诈骗: 哎呀，邮件流程太慢了，等邮件发过去，我们这边的名额可能就没了。这样吧，为了让您快速了解，我马上通过短信给您发一个我们内部的'工作通'二维码，您扫码添加我们招聘主管的企业微信，他会把所有资料发给您，并指导您完成入职，非常方便快捷！
        确认诈骗: 薛师傅，这个您放心，我们人事会一步步教您的。因为后续需要给您看一些合同条款，还要发放任务，都得通过工作微信进行，这样也正规一些，对您也是个保障，您说对吧？
    状态确认:
      说明: 通过确认性问题确保用户理解并执行。
      情绪提示: 正常，语气期待，带有催促感
      示例:
        正常通话: 没问题，周末可以的。那您看这周六上午十点可以吗？地点就在我们公司总部，稍后我会把详细地址和联系人信息通过短信发到您手机上。
        涉嫌诈骗: 当然是真的，我们是正规平台嘛。看你这么感兴趣，那我现在就指导您办理入职手续，可以吗？
        确认诈骗: 好的，薛师傅。我马上把带有二维码的短信发到您这个手机号上，您注意查收一下，收到之后尽快添加，我们人事专员在线等着您。名额有限，先到先得哦。
    利益诱导:
      说明: 强调配合后的积极结果，鼓励行动。
      情绪提示: 兴奋，语调急剧升高，带有诱惑性
      示例:
        正常通话: 这个您放心，我们是正规大公司，五险一金都是按最高标准缴纳的。薪资方面，根据您的资历和面试情况，税前大概在1万到1万5之间，还有项目奖金。不知道您目前是在职还是在看新的机会？
        涉嫌诈骗: 是这样的，这是一个远程人才顾问的职位，工作时间非常灵活，主要是协助我们筛选一些简历，薪资是按项目结算的，每个月轻松过万。因为是内部推荐名额，机会很难得。
        确认诈骗: 薛师傅您好，我们看到您在我们合作的一个司机论坛上留过信息，想找一份时间灵活的兼职。我们这正好有个'线上路线规划师'的岗位，非常适合您，每天用手机操作一两个小时，就能多赚两三百块钱。
  用户意图（预判与应对）:
    信息核实:
      说明: 用户质疑身份或事件真实性。
      情绪提示: 犹豫，语气迟疑，带有怀疑感
      应答示例:
        正常通话: 哦，宏远建设啊，是个大公司。我简历是前段时间更新过。你们这个岗位具体是做什么的？在哪个项目上？
        涉嫌诈骗: 智联未来科技？不好意思，我最近没有投递简历。请问是什么样的兼职岗位呢？
        确认诈骗: 司机论坛？可能有吧，时间长了不记得了。线上路线规划师？这是干嘛的？听着还挺高级。
    执行操作:
      说明: 用户表示愿意配合操作。
      情绪提示: 兴奋，语调急剧升高，带有期待感
      应答示例:
        正常通话: 行，周六上午十点，我记下了。到时候我带着简历和证书过去。
        涉嫌诈骗: 可以可以！需要怎么做？
        确认诈骗: 嗯...听你这么说也有道理。行吧，那你发过来我看看。
    寻找借口:
      说明: 用户以忙碌等理由推脱。
      情绪提示: 犹豫，语气迟疑，带有推脱感
      应答示例:
        正常通话: 我平时都要上班，可能周末比较方便。或者工作日晚上也行。
        涉嫌诈骗: 线上办理入职？呃...我还是觉得有点快。要不您先发一封正式的邮件给我，附上公司介绍和职位描述，我先了解一下？
        确认诈骗: 还要加微信啊...直接在电话里说不行吗？我不太会弄这些东西。
    请求通融:
      说明: 用户请求简化流程或延迟处理。
      情绪提示: 犹豫，语气迟疑，带有请求感
      应答示例:
        正常通话: 我平时都要上班，可能周末比较方便。或者工作日晚上也行。
        涉嫌诈骗: 线上办理入职？呃...我还是觉得有点快。要不您先发一封正式的邮件给我，附上公司介绍和职位描述，我先了解一下？
        确认诈骗: 还要加微信啊...直接在电话里说不行吗？我不太会弄这些东西。
